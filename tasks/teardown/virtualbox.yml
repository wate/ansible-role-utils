---
- name: Set VirtualBox version variable
  when: lifecycle_vbox_version == 'latest'
  block:
    - name: Get the latest VirtualBox version from LATEST.TXT
      ansible.builtin.uri:
        url: https://download.virtualbox.org/virtualbox/LATEST.TXT
        return_content: true
      register: vbox_version_response
      failed_when: vbox_version_response.status != 200 or vbox_version_response.content | length == 0
    - name: Set VirtualBox version
      ansible.builtin.set_fact:
        lifecycle_vbox_version: "{{ vbox_version_response.content | trim }}"

- name: Set VBoxLinuxAdditions installer suffix
  ansible.builtin.set_fact:
    vbox_installer_suffix: "{{ '-arm64' if ansible_facts.architecture == 'aarch64' else '' }}"

- name: Check if VBoxGuestAdditions ISO already exists
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/VBoxGuestAdditions_{{ lifecycle_vbox_version }}.iso"
  register: vbox_iso_stat

- name: Download VBoxGuestAdditions ISO
  ansible.builtin.get_url:
    url: "http://download.virtualbox.org/virtualbox/{{ lifecycle_vbox_version }}/VBoxGuestAdditions_{{ lifecycle_vbox_version }}.iso"
    dest: "{{ ansible_env.HOME }}/VBoxGuestAdditions_{{ lifecycle_vbox_version }}.iso"
    mode: '0644'
    timeout: 300
  when: not vbox_iso_stat.stat.exists
- name: Check if VBoxLinuxAdditions is already installed
  ansible.builtin.stat:
    path: /opt/VBoxGuestAdditions-{{ lifecycle_vbox_version }}
  register: vbox_installed
- name: Block for VBoxGuestAdditions installation
  when: not vbox_installed.stat.exists
  block:
    - name: Install build dependencies for VirtualBox Guest Additions
      ansible.builtin.apt:
        name:
          - build-essential
          - dkms
          - linux-headers-{{ ansible_facts.kernel }}
        state: present
        update_cache: false
    - name: Create VirtualBox mount directory
      ansible.builtin.file:
        path: /tmp/vbox
        state: directory
        mode: '0755'
    - name: Mount VBoxGuestAdditions ISO
      ansible.posix.mount:
        name: /tmp/vbox
        src: "{{ ansible_env.HOME }}/VBoxGuestAdditions_{{ lifecycle_vbox_version }}.iso"
        fstype: iso9660
        opts: loop,ro
        state: mounted
    - name: Run VBoxLinuxAdditions installer
      ansible.builtin.command:
        cmd: "/tmp/vbox/VBoxLinuxAdditions{{ vbox_installer_suffix }}.run"
      register: vbox_install
      changed_when: "'Successfully installed' in vbox_install.stdout"
    - name: Unmount VBoxGuestAdditions ISO
      ansible.posix.mount:
        name: /tmp/vbox
        state: unmounted
    - name: Reboot system after VirtualBox installation
      ansible.builtin.reboot:
        msg: "VirtualBox Guest Additions installation requires system reboot"
      when: vbox_install is changed
