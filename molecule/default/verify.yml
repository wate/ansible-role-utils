    ## Prepare タスクのテスト
    - name: Test prepare - package cache updated
      block:
        - name: Verify apt cache is recent
          ansible.builtin.stat:
            path: /var/lib/apt/periodic/update-success-stamp
          register: apt_stamp
        - name: Assert apt cache was updated
          ansible.builtin.assert:
            that:
              - apt_stamp.stat.exists
            fail_msg: "Package cache was not updated"
            success_msg: "Package cache was updated successfully"
