# code: language=ansible
---
- name: Verify - Granular Task Test
  hosts: all
  gather_facts: false
  become: true
  tasks:
    ## テストの前処理
    - name: Gather user facts
      ansible.builtin.getent:
        database: passwd

    - name: Set assert variables
      ansible.builtin.set_fact:
        registered_users: "{{ ansible_facts.getent_passwd }}"

    ## Finalize/symlink タスクテスト
    - name: Test finalize/symlink - individual task execution
      block:
        - name: Check symlink exists for testuser1
          ansible.builtin.stat:
            path: "{{ registered_users['testuser1'][4] }}/public"
          register: testuser1_symlink

        - name: Check symlink exists for testuser2
          ansible.builtin.stat:
            path: "{{ registered_users['testuser2'][4] }}/public"
          register: testuser2_symlink

        - name: Assert symlinks were created from granular task execution
          ansible.builtin.assert:
            that:
              - testuser1_symlink.stat.exists
              - testuser1_symlink.stat.islnk
              - testuser1_symlink.stat.lnk_source == '/var/www/testuser1'
              - testuser2_symlink.stat.exists
              - testuser2_symlink.stat.islnk
              - testuser2_symlink.stat.lnk_source == '/var/www/testuser2'
            fail_msg: "Symlinks were not created from individual granular task"
            success_msg: "Symlinks created successfully from finalize/symlink task"

