# code: language=ansible
---
- name: Converge - Granular Task Test
  hosts: all
  gather_facts: true
  become: true
  pre_tasks:
    - name: Update cache(apt)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts.pkg_mgr == 'apt'
      changed_when: false
    - name: Update cache(dnf)
      ansible.builtin.dnf:
        update_cache: true
      when: ansible_facts.pkg_mgr == 'dnf'
      changed_when: false
    # テスト用ユーザーとディレクトリ作成
    - name: Create test users
      ansible.builtin.user:
        name: "{{ item }}"
        state: present
        shell: /bin/bash
      loop:
        - testuser1
        - testuser2
    - name: Create test directories in /var/www
      ansible.builtin.file:
        path: "/var/www/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - testuser1
        - testuser2
  tasks:
    - name: Include prepare/update role
      ansible.builtin.include_role:
        name: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"
        tasks_from: prepare/update

    - name: Include finalize/symlink role
      ansible.builtin.include_role:
        name: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"
        tasks_from: finalize/symlink

    - name: Include teardown/autoremove role
      ansible.builtin.include_role:
        name: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | basename }}"
        tasks_from: teardown/autoremove

