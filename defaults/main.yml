---
## -------------------
## ホームディレクトリに作成するシンボリックリンクの名前
## -------------------
filesystem_symlink_dir: public

## -------------------
## シンボリックリンク元のベースディレクトリ
## -------------------
filesystem_symlink_src_dir: /var/www

## -------------------
## 除外ユーザー設定
## -------------------
lifecycle_exclude_users: []
  # - root
  # - nobody

## -------------------
## パッケージキャッシュの更新をするかどうか
## -------------------
package_update_cache: true

## -------------------
## インストール済みパッケージの更新をするかどうか
## -------------------
package_update_upgrade: true
